<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mickey</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        margin: 0;
      }

      canvas {
        display: block;
      }
    </style>

    <script src="https://unpkg.com/opentype.js@1.3.4/dist/opentype.min.js"></script>

    <script
      async
      src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"
    ></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/",
          "three-mesh-bvh": "https://cdn.jsdelivr.net/npm/three-mesh-bvh@0.8.0/build/index.module.js"
        }
      }
    </script>
    <script type="module">
      import * as THREE from "three";
      import { computeBoundsTree, disposeBoundsTree, acceleratedRaycast } from "three-mesh-bvh";
      import GUI from "https://cdn.jsdelivr.net/npm/lil-gui@0.18/+esm";

      // BVH monkey-patch for accelerated raycasting
      THREE.BufferGeometry.prototype.computeBoundsTree = computeBoundsTree;
      THREE.BufferGeometry.prototype.disposeBoundsTree = disposeBoundsTree;
      THREE.Mesh.prototype.raycast = acceleratedRaycast;

      window.THREE = THREE;
      window.GUI = GUI;
    </script>

    <script defer src="mickey.js"></script>
  </head>

  <body>
    <canvas class="canvas"></canvas>
  </body>
</html>
